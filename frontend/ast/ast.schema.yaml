interfaces:
  Decl: [Program, FnDecl, TypeDecl]
  Stmt: [BlockStmt, DeclareStmt, AssignStmt, ReturnStmt, YieldStmt, ExprStmt, ForStmt, BreakStmt, ContinueStmt, VecPushStmt]
  Expr: [Identifier, IntLiteral, BoolLiteral, StringLiteral, CompositeLiteral, CallExpr, BlockStmt, InfixExpr, PrefixExpr, FieldAccess, IndexExpr, SliceExpr, IfExpr, MatchExpr, TypeExprWrapper, AwaitExpr]
  TypeExpr: [NamedTypeExpr, ArrayTypeExpr, StructTypeExpr, SumTypeExpr, GenericTypeExpr]
  Pattern: [WildcardPattern, IdentifierPattern, LiteralPattern, CompositePattern]

nodes:
  # Declarations
  Program:
    fields: { Decls: "[]Decl" }
  FnDecl:
    fields: { Name: string, IsAsync: bool, Params: "[]*Param", ReturnType: TypeExpr, Body: "*BlockStmt" }
  TypeDecl:
    fields: { Name: "*Identifier", Rhs: TypeExpr }

  # Statements
  BlockStmt:
    fields: { Statements: "[]Stmt" }
  DeclareStmt:
    fields: { Name: string, Mutable: bool, Value: Expr }
  AssignStmt:
    fields: { LValue: Expr, RValue: Expr }
  ReturnStmt:
    fields: { Value: Expr }
  YieldStmt:
    fields: { Value: Expr }
  ExprStmt:
    fields: { Value: Expr }
  ForStmt:
    fields: { Init: Stmt, Condition: Expr, Post: Stmt, Body: "*BlockStmt" }
  BreakStmt:
    fields: {Token: "token.Token"}
  ContinueStmt:
    fields: {Token: "token.Token"}
  VecPushStmt:
    fields: { LValue: Expr, RValue: Expr }

  # Expressions
  Identifier:
    fields: { Value: string }
  IntLiteral:
    fields: { Value: int64 }
  BoolLiteral:
    fields: { Value: bool }
  StringLiteral:
    fields: { Value: string }
  CompositeLiteral:
    fields: { TypeExpr: TypeExpr, Elements: "[]CompositeElement" }
  CallExpr:
    fields: { Function: Expr, Arguments: "[]CallArg" }
  InfixExpr:
    fields: { Left: Expr, Operator: string, Right: Expr }
  PrefixExpr:
    fields: { Operator: string, Right: Expr }
  FieldAccess:
    fields: { Object: Expr, Field: "*Identifier" }
  IndexExpr:
    fields: { Left: Expr, Index: Expr }
  SliceExpr:
    fields: { Left: Expr, Low: Expr, High: Expr }
  IfExpr:
    fields: { Condition: Expr, Consequence: "*BlockStmt", Alternative: "*BlockStmt" }
  MatchExpr:
    fields: { Subject: Expr, Arms: "[]MatchArm" }

  # Patterns
  WildcardPattern:
    fields: {}
  IdentifierPattern:
    fields: { Name: string }
  LiteralPattern:
    fields: { Value: Expr }
  CompositePattern:
    fields: { TypeExpr: TypeExpr, Elements: "[]CompositePatternElement" }

  # Type Expressions
  TypeExprWrapper:
    fields: { TypeExpr: TypeExpr }
  NamedTypeExpr:
    fields: { Name: "*Identifier" }
  ArrayTypeExpr:
    fields: { Size: int, Base: TypeExpr }
  StructTypeExpr:
    fields: { Name: string, Fields: "[]StructTypeField" }
  SumTypeExpr:
    fields: { Name: string, TypeArgs: "[]TypeExpr", Variants: "[]VariantTypeExpr" }
  GenericTypeExpr:
    fields: { Name: "*Identifier", Args: "[]TypeExpr" }
  AwaitExpr:
    fields: { Value: Expr }