# ============================================================================
# MAML Runtime ABI Single Source of Truth
# ============================================================================

types:
  - alias: "SizeT"
    go_type: "IntType{}" # MAML AST Type
    cpp_type: "llvm::Type::getInt64Ty(ctx.Context)"
    zig_type: "usize"
  - alias: "Ptr"
    go_type: "AnyType{}"
    cpp_type: "llvm::PointerType::getUnqual(ctx.Context)"
    zig_type: "?*anyopaque"
  - alias: "i64"
    go_type: "IntType{}"
    cpp_type: "llvm::Type::getInt64Ty(ctx.Context)"
    zig_type: "i64"
  - alias: "u32"
    go_type: "IntType{}"
    cpp_type: "llvm::Type::getInt32Ty(ctx.Context)"
    zig_type: "u32"
  - alias: "i32"
    go_type: "IntType{}"
    cpp_type: "llvm::Type::getInt32Ty(ctx.Context)"
    zig_type: "i32"
  - alias: "i8"
    go_type: "IntType{}"
    cpp_type: "llvm::Type::getInt8Ty(ctx.Context)"
    zig_type: "u8"
  - alias: "bool"
    go_type: "BoolType{}"
    cpp_type: "llvm::Type::getInt1Ty(ctx.Context)"
    zig_type: "bool"
  - alias: "void"
    go_type: "UnitType{}"
    cpp_type: "llvm::Type::getVoidTy(ctx.Context)"
    zig_type: "void"
  - alias: "ArcHook"
    go_type: "AnyType{}"
    cpp_type: "llvm::PointerType::getUnqual(ctx.Context)"
    zig_type: "?*const fn (?*anyopaque) callconv(.c) void"

functions:
  # --- Memory & ARC ---
  - symbol: "maml_alloc"
    args: [{type: "SizeT"}]
    return: "Ptr"
  - symbol: "maml_free"
    args: [{type: "Ptr"}]
    return: "void"
  - symbol: "maml_retain"
    args: [{type: "Ptr"}]
    return: "void"
  - symbol: "maml_release"
    args: [{type: "Ptr"}]
    return: "void"

  # --- Vector Operations ---
  - symbol: "maml_vec_create"
    args: [{type: "u32"}, {type: "ArcHook"}, {type: "ArcHook"}]
    return: "Ptr"
  - symbol: "maml_vec_push"
    args: [{type: "Ptr", mut: true}, {type: "Ptr"}]
    return: "void"
  - symbol: "maml_vec_set"
    args: [{type: "Ptr", mut: true}, {type: "u32"}, {type: "Ptr"}]
    return: "void"
  - symbol: "maml_vec_get"
    args: [{type: "Ptr"}, {type: "u32"}]
    return: "Ptr"
  - symbol: "maml_vec_len"
    args: [{type: "Ptr"}]
    return: "u32"

  # --- Map Operations ---
  - symbol: "maml_map_create"
    args: [{type: "u32"}, {type: "i8"}, {type: "ArcHook"}, {type: "ArcHook"}, {type: "ArcHook"}, {type: "ArcHook"}]
    return: "Ptr"
  - symbol: "maml_map_put"
    args: [{type: "Ptr", mut: true}, {type: "u32"}, {type: "Ptr"}, {type: "u32"}, {type: "i32"}, {type: "Ptr"}]
    return: "void"
  - symbol: "maml_map_get"
    args: [{type: "Ptr"}, {type: "u32"}, {type: "Ptr"}, {type: "u32"}]
    return: "Ptr"
  - symbol: "maml_map_delete"
    args: [{type: "Ptr", mut: true}, {type: "u32"}, {type: "Ptr"}, {type: "u32"}, {type: "i32"}]
    return: "void"
  - symbol: "maml_map_len"
    args: [{type: "Ptr"}]
    return: "u32"

  # --- String Operations ---
  - symbol: "maml_str_hash"
    args: [{type: "Ptr"}, {type: "u32"}]
    return: "u32"
  - symbol: "maml_str_eq"
    args: [{type: "Ptr"}, {type: "u32"}, {type: "Ptr"}, {type: "u32"}]
    return: "i32"

  # --- Coroutine Executor ---
  - symbol: "maml_coro_resume_helper"
    args: [{type: "Ptr"}]
    return: "void"
  - symbol: "maml_coro_done_helper"
    args: [{type: "Ptr"}]
    return: "bool"
  - symbol: "maml_coro_destroy_helper"
    args: [{type: "Ptr", mut: true}]
    return: "void"
  - symbol: "maml_spawn_task"
    args: [{type: "Ptr"}]
    return: "void"
  - symbol: "maml_run_executor"
    args: [{type: "Ptr"}]
    return: "Ptr"
  - symbol: "maml_runtime_init"
    args: []
    return: "void"
  - symbol: "maml_task_await"
    args: [{type: "Ptr"}, {type: "Ptr"}] # target_task, waiting_task
    return: "void"
  - symbol: "maml_task_release"
    args: [{type: "Ptr", mut: true}]
    return: "void"
  - symbol: "maml_task_get_result"
    args: [{type: "Ptr"}]
    return: "void"
  - symbol: "maml_yield_now"
    args: [{type: "Ptr"}] # takes current_coro
    return: "void"

  # --- IO Functions ---
  - symbol: "maml_print"
    args: [{type: "Ptr"}, {type: "i32"}]
    return: "void"