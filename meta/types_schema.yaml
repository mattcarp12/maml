primitives:
  - name: I8Type
    cpp_kind: "i8"
  - name: I16Type
    cpp_kind: "i16"
  - name: I32Type
    cpp_kind: "i32"
  - name: I64Type
    cpp_kind: "i64"
  - name: I128Type
    cpp_kind: "i128"
  - name: U8Type
    cpp_kind: "u8"
  - name: U16Type
    cpp_kind: "u16"
  - name: U32Type
    cpp_kind: "u32"
  - name: U64Type
    cpp_kind: "u64"
  - name: U128Type
    cpp_kind: "u128"
  - name: F32Type
    cpp_kind: "f32"
  - name: F64Type
    cpp_kind: "f64"
  - name: BoolType
    cpp_kind: "i1"
  - name: CharType
    cpp_kind: "char"
  - name: UnitType
    cpp_kind: "void"
  - name: StringType
    cpp_kind: "string"
  - name: AnyType
    cpp_kind: "any"
  - name: UnknownType
    cpp_kind: "unknown"
  - name: PtrType
    cpp_kind: "ptr"

composites:
  - name: StructType
    json_kind: "struct"
    properties:
      - name: Name
        type: string
      - name: Fields
        type: "[]StructField"
      - name: IsReprC
        type: bool

  - name: SumType
    json_kind: "sum_type"
    properties:
      - name: BaseName
        type: string
      - name: Variants
        type: "[]SumVariant"
      - name: TypeArgs
        type: "[]Type"

containers:
  - name: ArrayType
    json_kind: "array"
    properties:
      - name: Base
        type: Type
      - name: Size
        type: int
  - name: ViewType
    json_kind: "view"
    properties:
      - name: Base
        type: Type
      - name: IsMut
        type: bool
  - name: VectorType
    json_kind: "vector"
    properties:
      - name: Base
        type: Type
  - name: MapType
    json_kind: "map"
    properties:
      - name: Key
        type: Type
      - name: Value
        type: Type
  - name: FutureType
    json_kind: "future"
    properties:
      - name: Base
        type: Type
  - name: RefType
    json_kind: "ref"
    properties:
      - name: Base
        type: Type
  - name: WeakRefType
    json_kind: "weak_ref"
    properties:
      - name: Base
        type: Type
  - name: SenderType
    json_kind: "sender"
    properties:
      - name: Base
        type: Type
  - name: ReceiverType
    json_kind: "receiver"
    properties:
      - name: Base
        type: Type

helpers:
  - name: StructField
    properties:
      - name: Name
        type: string
      - name: Type
        type: Type
  - name: SumVariant
    properties:
      - name: Name
        type: string
      - name: Discriminant
        type: int
      - name: TupleTypes
        type: "[]Type"
      - name: Fields
        type: "[]StructField"
